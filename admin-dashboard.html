<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard - TrustLoan</title>
<link rel="stylesheet" href="style.css">

<style>

.dashboard{
width:90%;
margin:auto;
margin-top:40px;
}

h2{
color:#4b1f6f;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

th, td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

th{
background:#4b1f6f;
color:white;
}

tr:hover{
background:#f5f5f5;
}

.btn{
padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.view{
background:#3498db;
color:white;
}

.approve{
background:#27ae60;
color:white;
}

.reject{
background:#e74c3c;
color:white;
}

</style>
</head>

<body>

    <div class="nav-links">

        <a href="admin.html">Admin</a>
