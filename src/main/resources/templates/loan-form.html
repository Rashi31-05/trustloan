<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan Application Form</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">
    <h2>Loan Application Form</h2>

    <form id="loanForm">

        <!-- Personal Details -->
        <h3>Personal Information</h3>

        <label>Full Name</label>
        <input type="text" name="customerName" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Mobile Number</label>
        <input type="text" name="mobile" required>

        <label>Date of Birth</label>
        <input type="date" name="dob" required>

        <label>Address</label>
        <textarea name="address" rows="3" required></textarea>

        <!-- Loan Details -->
        <h3>Loan Details</h3>

        <label>Loan Type</label>
        <select name="loanType" required>
            <option value="">Select</option>
            <option>Education Loan</option>
            <option>Home Loan</option>
            <option>Car Loan</option>
            <option>Personal Loan</option>
        </select>

        <label>Loan Amount</label>
        <input type="number" name="amount" required>

        <label>Loan Tenure (Years)</label>
        <input type="number" name="tenure" required>

        <!-- Employment Details -->
        <h3>Employment Details</h3>

        <label>Employment Type</label>
        <select name="employmentType" required>
            <option value="">Select</option>
            <option>Salaried</option>
            <option>Self Employed</option>
            <option>Student</option>
        </select>

        <label>Monthly Income</label>
        <input type="number" name="income" required>

        <label>Company / Institution Name</label>
        <input type="text" name="company">

        <!-- Bank Details -->
        <h3>Bank Details</h3>

        <label>Bank Name</label>
        <input type="text" name="bankName" required>

        <label>Account Number</label>
        <input type="text" name="accountNumber" required>

        <label>IFSC Code</label>
        <input type="text" name="ifsc" required>

        <button type="submit">Apply for Loan</button>

    </form>

    <p id="msg"></p>
</div>

<script>
    document.getElementById("loanForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const formData = new FormData(this);

        const loanData = {
            customerName: formData.get("customerName"),
            amount: formData.get("amount"),
            status: "PENDING"
        };

        fetch("http://localhost:8080/api/loans", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(loanData)
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("msg").innerText =
                "Loan Submitted Successfully! ID: " + data.id;
            this.reset();
        })
        .catch(err => {
            document.getElementById("msg").innerText =
                "Error submitting loan!";
            console.error(err);
        });
    });
</script>

</body>
</html>
